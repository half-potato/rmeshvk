<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>rmesh viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }
    #controls {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      display: flex; gap: 8px; align-items: center;
    }
    #controls label, #controls span {
      font-size: 13px; opacity: 0.8;
    }
    #file-input { font-size: 13px; }
    #primitives-panel {
      position: absolute; top: 50px; left: 10px; z-index: 10;
      background: rgba(30,30,30,0.9); border-radius: 6px; padding: 8px;
      font-size: 13px; min-width: 140px;
    }
    #primitives-panel button {
      margin: 2px; padding: 4px 8px; font-size: 12px;
      background: #444; color: #eee; border: 1px solid #666; border-radius: 3px; cursor: pointer;
    }
    #primitives-panel button:hover { background: #555; }
    #prim-list { margin-top: 6px; }
    #prim-list div {
      padding: 3px 6px; cursor: pointer; border-radius: 3px;
    }
    #prim-list div:hover { background: #444; }
    #prim-list div.selected { background: #2a5a8a; }
    #interact-hud {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(0,0,0,0.7); border-radius: 6px; padding: 6px 16px;
      font-size: 16px; font-weight: bold; display: none;
    }
    #interact-hud .mode { color: #fff; }
    #interact-hud .axis { color: #64b4ff; margin-left: 8px; }
    #interact-hud .numeric { color: #ffcc00; margin-left: 8px; font-family: monospace; }
    #status {
      position: absolute; bottom: 10px; left: 10px; z-index: 10;
      font-size: 12px; opacity: 0.6;
    }
    canvas {
      display: block; width: 100vw; height: 100vh;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
  <div id="controls">
    <input type="file" id="file-input" accept=".rmesh,.ply">
    <span id="info"></span>
  </div>
  <div id="primitives-panel">
    <strong>Primitives</strong><br>
    <button onclick="addPrimitive('cube')">Cube</button>
    <button onclick="addPrimitive('sphere')">Sphere</button>
    <button onclick="addPrimitive('plane')">Plane</button>
    <button onclick="addPrimitive('cylinder')">Cylinder</button>
    <button id="delete-btn" onclick="deleteSelected()" style="display:none; background:#833;">Delete</button>
    <div style="margin-top:6px;">
      <label><input type="checkbox" id="show-prims-cb" onchange="toggleShowPrimitives(this.checked)"> Show Primitives</label>
    </div>
    <div id="prim-list"></div>
  </div>
  <div id="interact-hud">
    <span class="mode"></span>
    <span class="axis"></span>
    <span class="numeric"></span>
  </div>
  <div id="status">Initializing WebGPU...</div>
  <canvas id="canvas" tabindex="0"></canvas>

  <script type="module">
    import init, { WebViewer } from './pkg/rmesh_viewer_web.js';

    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const info = document.getElementById('info');
    const fileInput = document.getElementById('file-input');
    const primList = document.getElementById('prim-list');
    const deleteBtn = document.getElementById('delete-btn');
    const interactHud = document.getElementById('interact-hud');

    let viewer = null;
    let leftDown = false, middleDown = false, rightDown = false;
    let lastX = 0, lastY = 0;

    // Expose to onclick handlers
    window.addPrimitive = function(kind) {
      if (!viewer) return;
      viewer.add_primitive(kind);
      refreshPrimList();
    };
    window.deleteSelected = function() {
      if (!viewer) return;
      viewer.delete_selected();
      refreshPrimList();
    };
    window.toggleShowPrimitives = function(show) {
      if (!viewer) return;
      viewer.set_show_primitives(show);
    };

    function refreshPrimList() {
      if (!viewer) return;
      const count = viewer.primitive_count();
      const sel = viewer.get_selected();
      primList.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.textContent = viewer.primitive_name(i);
        if (i === sel) div.classList.add('selected');
        div.addEventListener('click', () => {
          viewer.set_selected(i === sel ? -1 : i);
          refreshPrimList();
        });
        primList.appendChild(div);
      }
      deleteBtn.style.display = sel >= 0 ? '' : 'none';
    }

    function updateHud() {
      if (!viewer) return;
      const info = viewer.display_info();
      if (!info) {
        interactHud.style.display = 'none';
        return;
      }
      const parts = info.split('|');
      interactHud.querySelector('.mode').textContent = parts[0] || '';
      interactHud.querySelector('.axis').textContent = parts[1] || '';
      interactHud.querySelector('.numeric').textContent = parts[2] || '';
      interactHud.style.display = info ? '' : 'none';
    }

    async function start() {
      if (!navigator.gpu) {
        const msg = 'WebGPU is not supported in this browser.\n\n'
          + 'Requirements:\n'
          + '  - Chrome 113+ / Edge 113+\n'
          + '  - Firefox: enable dom.webgpu.enabled in about:config\n'
          + '  - Safari 18+\n\n'
          + 'Make sure hardware acceleration is enabled.';
        alert(msg);
        status.textContent = 'WebGPU not available';
        return;
      }

      await init();
      try {
        viewer = await WebViewer.create('canvas');
        status.textContent = 'Ready — load an .rmesh or .ply file';
      } catch (e) {
        alert('WebGPU initialization failed:\n\n' + e);
        status.textContent = 'WebGPU init failed: ' + e;
        console.error(e);
        return;
      }

      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        status.textContent = 'Loading ' + file.name + '...';
        const buf = new Uint8Array(await file.arrayBuffer());
        try {
          if (file.name.endsWith('.ply')) {
            viewer.load_ply(buf);
          } else {
            viewer.load_rmesh(buf);
          }
          info.textContent = file.name;
          status.textContent = '';
        } catch (err) {
          status.textContent = 'Load error: ' + err;
          console.error(err);
        }
      });

      // --- Keyboard controls ---
      window.addEventListener('keydown', (e) => {
        if (!viewer) return;
        const result = viewer.on_key_down(e.key);
        if (result !== 'NotConsumed') {
          e.preventDefault();
          updateHud();
          refreshPrimList();
        }
      });

      window.addEventListener('keyup', (e) => {
        if (!viewer) return;
        viewer.on_key_up(e.key);
      });

      // --- Mouse controls ---
      canvas.addEventListener('mousedown', (e) => {
        if (!viewer) return;
        if (viewer.is_interacting()) {
          const result = viewer.on_interact_mouse_down(e.button);
          if (result !== 'NotConsumed') {
            updateHud();
            refreshPrimList();
            return;
          }
        }
        if (e.button === 0) leftDown = true;
        if (e.button === 1) middleDown = true;
        if (e.button === 2) rightDown = true;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      window.addEventListener('mouseup', (e) => {
        if (e.button === 0) leftDown = false;
        if (e.button === 1) middleDown = false;
        if (e.button === 2) rightDown = false;
      });

      canvas.addEventListener('mousemove', (e) => {
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;

        if (!viewer) return;
        if (viewer.is_interacting()) {
          viewer.on_interact_mouse_move(dx, dy);
          updateHud();
          return;
        }
        if (leftDown)   viewer.orbit(dx, dy);
        if (middleDown) viewer.pan(dx, dy);
        if (rightDown)  viewer.zoom(dy);
      });

      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (viewer && !viewer.is_interacting()) {
          viewer.zoom(-e.deltaY * 0.1);
        }
      }, { passive: false });

      canvas.addEventListener('contextmenu', (e) => e.preventDefault());

      // --- Resize ---
      function onResize() {
        const dpr = window.devicePixelRatio || 1;
        const w = Math.floor(canvas.clientWidth * dpr);
        const h = Math.floor(canvas.clientHeight * dpr);
        canvas.width = w;
        canvas.height = h;
        if (viewer) viewer.resize(w, h);
      }
      window.addEventListener('resize', onResize);
      onResize();

      // --- Render loop ---
      function frame() {
        if (viewer && viewer.has_scene()) {
          try { viewer.render(); } catch (e) { console.error('render:', e); }
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    start();
  </script>
</body>
</html>
